<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Thread - Mini E-commerce</title>

    <!-- Estilos ya generados-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container my-4">

        <!-- LOGO (imagen + título de la tienda) -->
        <div class="text-center mb-3">
            <img src="img/logo/logo-jaguar.png" width="120">
            <h1>Thread Store</h1>
        </div>

        <!-- PRODUCTOS desde el JS -->
        <div class="row" id="productos"></div>

        <hr class="my-4">

        <!-- CARRITO -->
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">Carrito de compras</h4>
            </div>

            <div class="card-body">
            <!-- LISTA DINÁMICA DEL CARRITO -->
                <ul id="carrito" class="list-group mb-3"></ul>
                <!-- TOTAL QUE SE ACTUALIZA CON JS -->
                <h4>Total: $<span id="total">0.00</span></h4>
                <!-- BOTÓN PARA BORRAR TODO EL CARRITO -->
                <button class="btn btn-danger" onclick="vaciarCarrito()">Vaciar carrito</button>
            </div>
        </div>

    </div>

    <script>
    // ARREGLO PRINCIPAL (como base de datos de productos)

        const productos = [
            {
                id: 1,
                nombre: "Blazer Camel",
                precio: 1200,
                imagen: "img/prendas/blazer-camel.jpg"
            },
            {
                id: 2,
                nombre: "Blazer Crudo",
                precio: 1150,
                imagen: "img/prendas/blazer-crudo.jpeg"
            },
            {
                id: 3,
                nombre: "Falda Plisada",
                precio: 800,
                imagen: "img/prendas/falda-plisada.jpg"
            },
            {
                id: 4,
                nombre: "Pantalón Wide",
                precio: 950,
                imagen: "img/prendas/pantalon-wide.jpg"
            },
            {
                id: 5,
                nombre: "Top Tejido",
                precio: 600,
                imagen: "img/prendas/top-tejido.jpeg"
            }
        ];

        // ARREGLO DEL CARRITO (aquí se guardan los productos que el usuario agrega)
        let carrito = [];

        // FUNCIÓN: muestra los productos en pantalla
        function mostrarProductos() {
            const contenedor = document.getElementById("productos");

            // recorre todos los productos
            productos.forEach(producto => {
                // inserta HTML dinámicamente
                contenedor.innerHTML += `
        <div class="col-md-3 mb-4">
            <div class="card h-100 shadow-sm">

                <img src="${producto.imagen}" class="card-img-top"
                style="height:180px; object-fit:cover;">

                <div class="card-body text-center">
                    <h5>${producto.nombre}</h5>
                    <p>$${producto.precio.toFixed(2)}</p>

                    <input type="number"
                    id="cantidad-${producto.id}"
                    class="form-control mb-2"
                    value="1" min="1">

                    <button class="btn btn-primary w-100"
                    onclick="agregarCarrito(${producto.id})">
                    Agregar al carrito
                    </button>
                </div>

            </div>
        </div>
        `;
            });
        }

        // FUNCIÓN: agrega productos al carrito
        function agregarCarrito(id) {
            // busca el producto en el arreglo (find = encontrar)
            const producto = productos.find(p => p.id === id);
            // obtiene la cantidad del input
            const cantidad = parseInt(document.getElementById(`cantidad-${id}`).value);
            
            if (cantidad <= 0 || isNaN(cantidad)) {
                alert("Ingresa una cantidad válida");
                return;
            }

            const productoEnCarrito = carrito.find(item => item.id === id);

            if (productoEnCarrito) {
                productoEnCarrito.cantidad += cantidad;
            } else {
                carrito.push({
                    id: producto.id,
                    nombre: producto.nombre,
                    precio: producto.precio,
                    cantidad: cantidad
                });
            }

            mostrarCarrito();
        }
        // FUNCIÓN: muestra lo que hay en el carrito
        function mostrarCarrito() {
            const lista = document.getElementById("carrito");
            const totalHTML = document.getElementById("total");

            lista.innerHTML = "";
            let total = 0;

            carrito.forEach(item => {
                const subtotal = item.precio * item.cantidad;
                total += subtotal;

                lista.innerHTML += `
        <li class="list-group-item d-flex justify-content-between align-items-center">
            <div>
                <strong>${item.nombre}</strong><br>
                Cantidad: ${item.cantidad} | Precio: $${item.precio.toFixed(2)}
            </div>
            <span>$${subtotal.toFixed(2)}</span>
        </li>
        `;
            });

            totalHTML.innerText = total.toFixed(2);
        }

        // FUNCIÓN: vacía todo el carrito
        function vaciarCarrito() {
            carrito = [];
            mostrarCarrito();
        }

        mostrarProductos();

    </script>

</body>

</html>
